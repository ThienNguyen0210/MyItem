effects:
  # ────────────────────────────────────────────────
  # Khoa học / Vũ trụ / Năng lượng
  # ────────────────────────────────────────────────
  # ATOM: 3 quỹ đạo xoay quanh người như electron. Dùng fixed (false) để luôn ổn định quanh trục đứng.
  science_aura:
    particle: "SOUL_FIRE_FLAME"
    arrangement: "ATOM"
    radius: 1.2  # Bán kính quỹ đạo
    speed: 0.0
    frequency: 1.5  # Tốc độ xoay (cao hơn = nhanh hơn)
    use-view-direction: false  # false: fixed quanh người (không lệch khi nhìn lên/xuống)

  # ATOM với nhiều quỹ đạo hơn, offset lên cao như orb bay lơ lửng.
  quantum_orbits:
    particle: "ELECTRIC_SPARK"
    arrangement: "ATOM"
    radius: 1.4
    points: 4  # Số quỹ đạo (thay đổi để nhiều/ít hơn)
    forward-offset: 0.0  # Dịch theo hướng nhìn (0 = trung tâm)
    upward-offset: 1.8  # Dịch lên cao (ngang đầu)
    speed: 0.0
    frequency: 2.2
    use-view-direction: false  # fixed: orb luôn xoay ổn định

  # SPHERE: Hạt phân bố đều trên cầu plasma, lấp lánh.
  plasma_sphere:
    particle: "GLOW"
    arrangement: "SPHERE"
    radius: 0.9
    points: 18  # Số điểm trên cầu (cao hơn = mịn hơn, nhưng nặng server)
    upward-offset: 1.6
    speed: 0.05  # Tốc độ bay của hạt
    frequency: 1.0
    use-view-direction: false  # fixed: cầu luôn tròn đều

  # ────────────────────────────────────────────────
  # Thiên thần / Thần thánh / Ánh sáng
  # ────────────────────────────────────────────────
  # WINGS: Cánh thiên thần đập sau lưng. Fixed để cánh luôn đối xứng sau lưng.
  divine_wings:
    particle: "END_ROD"
    arrangement: "WINGS"
    radius: 1.5  # Độ dài sải cánh
    forward-offset: -0.3  # Negative: sau lưng
    upward-offset: 1.2  # Ngang vai
    frequency: 1.0  # Tốc độ đập cánh
    speed: 0.0
    use-view-direction: false  # false: cánh không méo khi cúi/ngẩng đầu

  # CIRCLE: Vòng hào quang trên đầu, xoay nhanh.
  angelic_halo:
    particle: "TOTEM_OF_UNDYING"
    arrangement: "CIRCLE"
    radius: 0.6
    points: 24  # Số điểm trên vòng (cao = mịn)
    upward-offset: 2.4  # Trên đầu
    forward-offset: 0.0
    speed: 0.02
    frequency: 3.0  # Xoay rất nhanh
    use-view-direction: false  # fixed: vòng luôn nằm ngang

  # SPHERE: Aura thánh quang bao quanh.
  holy_aura:
    particle: "ENCHANT"
    arrangement: "SPHERE"
    radius: 1.1
    points: 12
    upward-offset: 1.0
    speed: 0.0
    frequency: 0.8
    use-view-direction: false

  # ────────────────────────────────────────────────
  # Ma thuật / Phù thủy / Hắc ám
  # ────────────────────────────────────────────────
  # POLYGON: Tam giác ma thuật xoay dưới chân.
  magic_triangle:
    particle: "CRIT_MAGIC"
    arrangement: "POLYGON"
    edges: 3  # Số cạnh (3=tam giác, 5=ngôi sao, 6=lục giác)
    radius: 1.5
    upward-offset: 0.1  # Gần sát chân
    frequency: 2.0
    speed: 0.0
    use-view-direction: false  # false: luôn phẳng dưới chân

  # POLYGON ngôi sao 5 cánh (pentagram).
  pentagram_star:
    particle: "WITCH"
    arrangement: "POLYGON"
    edges: 5
    radius: 1.3
    upward-offset: 0.05
    forward-offset: 0.0
    frequency: 1.8
    speed: 0.01
    use-view-direction: false

  # SPIRAL: Xoáy khói tối từ dưới lên.
  dark_vortex:
