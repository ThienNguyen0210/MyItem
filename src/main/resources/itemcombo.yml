# Bộ Thiên Ma - Yêu cầu mặc đủ 4 món: Mũ, Áo, Quần, Giày có ID 'ThienMa'
ThienMa:
  message: "&b[Combo] &fBạn đã kích hoạt sức mạnh bộ &6Thiên Ma&f!"
  stats:
    all_damage: 10.0      # Tăng 10% sát thương toàn phần
    all_defense: 15.0     # Tăng 15% phòng thủ toàn phần
    critical_chance: 5.0  # +5% tỷ lệ chí mạng (sử dụng key đúng trong hàm updateStat)
    damage: 50.0          # +50 Sát thương cộng thêm
    armor: 20.0           # +20 Giáp (vanilla)

